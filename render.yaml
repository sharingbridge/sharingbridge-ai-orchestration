# Render Blueprint — Docker; Start Command must stay blank (uses start.sh).
# Guide: https://github.com/sharingbridge/sharingbridge/blob/main/configuration/backend-render.md
services:
  - type: web
    name: sharingbridge-ai-orchestration
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AI_LLM_MODE
        value: deterministic
      - key: AI_ORCHESTRATION_INTERNAL_API_KEY
        value: ""
      - key: SHARINGBRIDGE_WEBSITE_URL
        value: pending
